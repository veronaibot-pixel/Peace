<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <!-- Baby dragon - small cute blob dragon -->
  <!-- Body -->
  <rect x="11" y="14" width="10" height="10" rx="4" fill="#5CBF5C"/>
  <rect x="12" y="15" width="8" height="8" rx="3" fill="#7DD87D"/>
  <!-- Head -->
  <rect x="12" y="9" width="9" height="8" rx="4" fill="#7DD87D"/>
  <!-- Eyes -->
  <rect x="14" y="12" width="2" height="2" fill="#1A1A1A"/>
  <rect x="18" y="12" width="2" height="2" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <rect x="14" y="12" width="1" height="1" fill="#FFFFFF"/>
  <rect x="18" y="12" width="1" height="1" fill="#FFFFFF"/>
  <!-- Tiny horns -->
  <rect x="13" y="8" width="2" height="2" fill="#E8A838"/>
  <rect x="18" y="8" width="2" height="2" fill="#E8A838"/>
  <!-- Small wings -->
  <rect x="8" y="14" width="3" height="4" rx="1" fill="#A8E6A8"/>
  <rect x="21" y="14" width="3" height="4" rx="1" fill="#A8E6A8"/>
  <!-- Tail -->
  <rect x="21" y="20" width="3" height="2" rx="1" fill="#5CBF5C"/>
  <rect x="23" y="19" width="2" height="2" rx="1" fill="#5CBF5C"/>
  <!-- Belly -->
  <rect x="14" y="17" width="4" height="4" rx="2" fill="#FFFDE8"/>
  <!-- Shadow -->
  <ellipse cx="16" cy="26" rx="6" ry="2" fill="rgba(0,0,0,0.1)"/>
</svg>
