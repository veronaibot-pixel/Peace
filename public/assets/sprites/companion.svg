<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <!-- Companion dragon - full majestic dragon -->
  <!-- Body -->
  <rect x="9" y="15" width="14" height="12" rx="5" fill="#3D9E3D"/>
  <rect x="10" y="16" width="12" height="10" rx="4" fill="#4AAF4A"/>
  <!-- Head -->
  <rect x="10" y="6" width="12" height="11" rx="4" fill="#4AAF4A"/>
  <!-- Eyes - fierce -->
  <rect x="12" y="9" width="3" height="3" rx="1" fill="#FF6B35"/>
  <rect x="18" y="9" width="3" height="3" rx="1" fill="#FF6B35"/>
  <rect x="13" y="10" width="2" height="2" fill="#1A1A1A"/>
  <rect x="19" y="10" width="2" height="2" fill="#1A1A1A"/>
  <!-- Crown horns -->
  <rect x="11" y="3" width="2" height="4" fill="#E8A838"/>
  <rect x="14" y="2" width="2" height="4" fill="#FFD700"/>
  <rect x="17" y="2" width="2" height="4" fill="#FFD700"/>
  <rect x="20" y="3" width="2" height="4" fill="#E8A838"/>
  <!-- Large wings -->
  <rect x="2" y="10" width="7" height="12" rx="2" fill="#5CBF5C"/>
  <rect x="3" y="8" width="5" height="5" rx="2" fill="#7DD87D"/>
  <rect x="2" y="9" width="2" height="8" fill="#3D9E3D"/>
  <rect x="23" y="10" width="7" height="12" rx="2" fill="#5CBF5C"/>
  <rect x="24" y="8" width="5" height="5" rx="2" fill="#7DD87D"/>
  <rect x="28" y="9" width="2" height="8" fill="#3D9E3D"/>
  <!-- Tail with flame tip -->
  <rect x="23" y="23" width="4" height="2" rx="1" fill="#3D9E3D"/>
  <rect x="26" y="22" width="3" height="2" rx="1" fill="#3D9E3D"/>
  <rect x="28" y="21" width="3" height="3" rx="1" fill="#FF4500"/>
  <rect x="29" y="20" width="2" height="2" fill="#FFD700"/>
  <!-- Belly scales -->
  <rect x="12" y="18" width="8" height="7" rx="3" fill="#FFFDE8"/>
  <rect x="13" y="19" width="2" height="2" fill="#F0E68C"/>
  <rect x="16" y="19" width="2" height="2" fill="#F0E68C"/>
  <rect x="14" y="22" width="2" height="2" fill="#F0E68C"/>
  <!-- Fire breath particles -->
  <rect x="14" y="14" width="1" height="1" fill="#FF4500" opacity="0.7"/>
  <rect x="18" y="14" width="1" height="1" fill="#FF4500" opacity="0.7"/>
  <!-- Shadow -->
  <ellipse cx="16" cy="29" rx="8" ry="2" fill="rgba(0,0,0,0.15)"/>
</svg>
