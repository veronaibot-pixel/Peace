<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <!-- Child dragon - bigger, more defined -->
  <!-- Body -->
  <rect x="10" y="15" width="12" height="11" rx="4" fill="#4AAF4A"/>
  <rect x="11" y="16" width="10" height="9" rx="3" fill="#5CBF5C"/>
  <!-- Head -->
  <rect x="11" y="7" width="11" height="10" rx="4" fill="#5CBF5C"/>
  <!-- Eyes -->
  <rect x="13" y="10" width="3" height="3" rx="1" fill="#1A1A1A"/>
  <rect x="18" y="10" width="3" height="3" rx="1" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <rect x="14" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="19" y="10" width="1" height="1" fill="#FFFFFF"/>
  <!-- Horns -->
  <rect x="12" y="5" width="2" height="3" fill="#E8A838"/>
  <rect x="14" y="4" width="1" height="2" fill="#E8A838"/>
  <rect x="19" y="5" width="2" height="3" fill="#E8A838"/>
  <rect x="18" y="4" width="1" height="2" fill="#E8A838"/>
  <!-- Wings -->
  <rect x="5" y="12" width="5" height="8" rx="2" fill="#7DD87D"/>
  <rect x="6" y="11" width="3" height="3" rx="1" fill="#A8E6A8"/>
  <rect x="22" y="12" width="5" height="8" rx="2" fill="#7DD87D"/>
  <rect x="23" y="11" width="3" height="3" rx="1" fill="#A8E6A8"/>
  <!-- Tail -->
  <rect x="22" y="22" width="4" height="2" rx="1" fill="#4AAF4A"/>
  <rect x="25" y="21" width="3" height="2" rx="1" fill="#4AAF4A"/>
  <rect x="27" y="20" width="2" height="2" rx="1" fill="#E85838"/>
  <!-- Belly -->
  <rect x="13" y="18" width="6" height="5" rx="2" fill="#FFFDE8"/>
  <!-- Nostrils - small smoke -->
  <rect x="14" y="14" width="1" height="1" fill="#4A4A4A"/>
  <rect x="18" y="14" width="1" height="1" fill="#4A4A4A"/>
  <!-- Shadow -->
  <ellipse cx="16" cy="28" rx="7" ry="2" fill="rgba(0,0,0,0.1)"/>
</svg>
